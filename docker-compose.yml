version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ai_finops
      POSTGRES_PASSWORD: password
      POSTGRES_DB: canonical_events
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
